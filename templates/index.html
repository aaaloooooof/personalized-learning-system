<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个性化学习系统</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">📚 个性化学习系统</h1>
      <p class="tagline">探索知识，点亮未来</p>
    </div>
  </header>

  <main class="container">
    <!-- Filters -->
    <section class="filters" aria-label="筛选条件">
      <div class="filter-group">
        <label class="filter-label">分类：</label>
        <div id="category-filters" class="filter-chips">
          <button class="chip active" data-category="">全部</button>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label">难度：</label>
        <div class="filter-chips">
          <button class="chip active" data-difficulty="">全部</button>
          <button class="chip" data-difficulty="入门">入门</button>
          <button class="chip" data-difficulty="中级">中级</button>
          <button class="chip" data-difficulty="进阶">进阶</button>
        </div>
      </div>
    </section>

    <!-- Post grid -->
    <section id="posts-grid" class="posts-grid" aria-label="学习内容列表">
      <div class="loading-spinner" id="loading">加载中…</div>
    </section>
  </main>

  <!-- Post detail modal -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="关闭">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
